<head><meta charset="utf-8"><title></title><style>html,body{margin:0;padding:0;height:100%;background:#fff;}</style></head>
<body>
<script>"use strict";
(function () {
  var ALLOWED = ["https://manus.im","https://vida.butterfly-effect.dev","http://localhost:3000"];
  function isAllowed(o) { return ALLOWED.indexOf(o) !== -1; }

  function render(html) {
    try {
      document.open();
      document.write(html);
      document.close();
    } catch (err) {
      try { document.body.innerHTML = String(html); } catch (_) {}
    }
  }

  window.addEventListener('message', function (e) {
    if (!isAllowed(e.origin)) return;
    if (!e.data || typeof e.data !== 'object') return;
		if (e.data.type !== 'manus:preview:render') return;
		if (typeof e.data.html !== 'string') return;
		render(e.data.html);
  });

  function notifyReady() {
    for (var i = 0; i < ALLOWED.length; i++) {
      try { parent.postMessage({ type: 'manus:preview:ready' }, ALLOWED[i]); } catch (_) {}
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', notifyReady, { once: true });
  } else {
    notifyReady();
  }
})();</script>
